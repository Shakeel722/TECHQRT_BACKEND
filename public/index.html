 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Clinic Receptionist</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        .mic-btn {
            background: #007bff;
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,123,255,0.3);
        }
        .mic-btn.listening {
            background: #dc3545;
            box-shadow: 0 0 0 15px rgba(220, 53, 69, 0.3);
            animation: pulse 1.5s infinite;
        }
        .status {
            margin: 20px 0;
            font-weight: bold;
            color: #555;
        }
        .transcript-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 15px;
            border-radius: 6px;
            min-height: 60px;
            text-align: left;
            font-size: 14px;
            color: #333;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Virtual Medical Receptionist</h2>
    <p>Click the mic and start booking your appointment</p>
    
    <button id="micBtn" class="mic-btn">🎙️</button>
    <div id="status" class="status">Click to speak</div>
    
    <div class="transcript-box">
        <strong>You said:</strong> <span id="userTranscript">...</span><br><br>
        <strong>Assistant:</strong> <span id="botReply">...</span>
    </div>
</div>

<script>
    // Check for Browser Web Speech Support
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Your browser does not support Web Speech API. Please use Google Chrome.");
    }

    const recognition = new SpeechRecognition();
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('status');
    const userTranscriptDisplay = document.getElementById('userTranscript');
    const botReplyDisplay = document.getElementById('botReply');

    let isListening = false;

    recognition.continuous = false;
    recognition.lang = 'en-IN'; // Sets region (e.g., en-US, en-IN)
    recognition.interimResults = false;

    // Toggle Microphone state
    micBtn.addEventListener('click', () => {
        if (!isListening) {
            recognition.start();
        } else {
            recognition.stop();
        }
    });

    recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add('listening');
        statusText.innerText = "Listening...";
    };

    recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove('listening');
        statusText.innerText = "Processing reply...";
    };

    recognition.onresult = async (event) => {
        const transcript = event.results[0][0].transcript;
        userTranscriptDisplay.innerText = transcript;
        
        // Send transcript to your Node.js backend
        try {
            const response = await fetch('/api/voice/process', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: transcript })
            });
            
            const data = await response.json();
            
            if (data.reply) {
                botReplyDisplay.innerText = data.reply;
                statusText.innerText = "Click to speak again";
                speak(data.reply); // Read response aloud
            } else {
                botReplyDisplay.innerText = "Error processing your request.";
            }
        } catch (err) {
            console.error("Backend communication error:", err);
            statusText.innerText = "Error reaching server.";
        }
    };

    // Text-to-Speech Engine Function
    function speak(text) {
        // Cancel any active speaking frames
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0; // Speed control
        utterance.pitch = 1.0; // Pitch control
        
        // Select a natural-sounding voice if available
        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(voice => voice.name.includes("Google") || voice.name.includes("Natural"));
        if (preferredVoice) utterance.voice = preferredVoice;

        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
